<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>69B Store</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#7a0d16;
color:white;
text-align:center;
}
.container{padding:20px;max-width:600px;margin:auto;}
h1{font-size:40px;margin-top:20px;}
.card{
background:white;
color:#7a0d16;
padding:20px;
margin:15px 0;
border-radius:20px;
font-size:18px;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
.small{font-size:14px;color:#555;}
.list{display:none;}
.username{
background:white;
color:#000;
padding:12px;
margin:6px;
border-radius:12px;
display:inline-block;
cursor:pointer;
}
.back{
margin-top:20px;
display:inline-block;
background:#fff;
color:#7a0d16;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="container" id="home">

<h1>69B Store</h1>

<div class="card" onclick="show('quad')">
يوزرات انستا رباعية وشبه ثلاثي
<div class="small">يبدأ السعر من 140 ويزداد حسب اليوزر</div>
</div>

<div class="card" onclick="show('triple')">
يوزرات انستا ثلاثية وشبه ثنائي
<div class="small">يبدأ السعر من 1600 ويزداد حسب اليوزر</div>
</div>

<div class="card" onclick="show('double')">
يوزرات انستا ثنائية
<div class="small">يبدأ السعر من 15 ألف ويزداد حسب اليوزر</div>
</div>

</div>

<!-- رباعي -->
<div class="container list" id="quad">
<h2>الرباعيات</h2>

<div id="quadList"></div>

<div class="back" onclick="back()">رجوع</div>
</div>

<!-- ثلاثي -->
<div class="container list" id="triple">
<h2>الثلاثيات</h2>

<div id="tripleList"></div>

<div class="back" onclick="back()">رجوع</div>
</div>

<!-- ثنائي -->
<div class="container list" id="double">
<h2>الثنائيات</h2>

<div id="doubleList"></div>

<div class="back" onclick="back()">رجوع</div>
</div>

<script>

const insta="https://www.instagram.com/69bstore";

function show(id){
document.getElementById("home").style.display="none";
document.querySelectorAll(".list").forEach(e=>e.style.display="none");
document.getElementById(id).style.display="block";
}

function back(){
document.getElementById("home").style.display="block";
document.querySelectorAll(".list").forEach(e=>e.style.display="none");
}

function make(list,box){
list.forEach(u=>{
let d=document.createElement("div");
d.className="username";
d.innerText=u;
d.onclick=()=>window.open(insta);
box.appendChild(d);
});
}

/* بيانات */

const quad=[
"4u.z","7x.y","a1.q","b2.m","c3.n","d4.p","e5.r","f6.s",
"g7.t","h8.u","i9.v","j0.w","k1.x","l2.y","m3.z"
];

const triple=[
"AFA","AXA","AQA","AMA","ARA","AA5","A8A","3AA",
"AZZ","APP","ARR","AGG","ATT","A22","A77"
];

const double=[
"A7","A3","AX","5A","AQ","B7","B3","BX",
"C7","C3","CX","5C","CQ"
];

/* عرض */
make(quad,document.getElementById("quadList"));
make(triple,document.getElementById("tripleList"));
make(double,document.getElementById("doubleList"));

</script>

</body>
</html>
